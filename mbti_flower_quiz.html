:root{
  --rose:#d4446e;--hot:#e8175d;--petal:#f7afc8;
  --coral:#f4845f;--gold:#c8973a;--gold-lt:#f0d080;
  --sage:#5a9e6f;--leaf:#3d7a52;--cream:#fdf7ef;
  --text:#2e1a0e;--soft:#7a5a4a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .45s ease,transform .45s ease;z-index:10;}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(18px);}

/* ── START ── */
#start-screen{background:linear-gradient(155deg,#fff8ee 0%,#ffeaf4 45%,#f0f8ee 100%);overflow:hidden;}
.falling-petal{position:absolute;border-radius:60% 0 60% 0;opacity:0;pointer-events:none;animation:fallDown linear infinite;}
@keyframes fallDown{0%{transform:translateY(-60px) rotate(0deg);opacity:0}8%{opacity:.7}90%{opacity:.5}100%{transform:translateY(110vh) rotate(600deg) scale(.7);opacity:0}}
.sparkle{position:absolute;pointer-events:none;animation:twinkle ease-in-out infinite alternate;}
.sparkle::before{content:'✦';color:var(--gold);filter:drop-shadow(0 0 5px var(--gold-lt));}
@keyframes twinkle{0%{opacity:.1;transform:scale(.5)}100%{opacity:1;transform:scale(1.3)}}
.fc{position:absolute;pointer-events:none;}
.fc-tl{top:-20px;left:-20px}.fc-tr{top:-20px;right:-20px;transform:scaleX(-1)}
.fc-bl{bottom:-20px;left:-20px;transform:scaleY(-1)}.fc-br{bottom:-20px;right:-20px;transform:scale(-1)}

.start-content{position:relative;z-index:20;display:flex;flex-direction:column;align-items:center;text-align:center;padding:10px 16px;gap:8px;}
.event-tag{background:var(--leaf);color:white;font-size:clamp(16px,2.5vw,20px);font-weight:900;padding:9px 26px;border-radius:30px;letter-spacing:.5px;white-space:nowrap;box-shadow:0 4px 16px rgba(61,122,82,.3);animation:tagBob 2.5s ease-in-out infinite alternate;}
.event-sub{display:flex;align-items:center;justify-content:center;}
.logo-img{
  height:clamp(38px,6.5vw,58px);width:auto;display:block;
  mix-blend-mode:multiply;
}
.event-sub {
  background:white;
  border:2.5px solid rgba(61,122,82,.5);
  border-radius:14px;
  padding:10px 28px !important;
  box-shadow:0 2px 10px rgba(61,122,82,.12);
}
@keyframes tagBob{0%{transform:translateY(0)}100%{transform:translateY(-5px)}}
.start-title-en{font-family:'Noto Serif KR',serif;font-size:clamp(15px,2vw,18px);color:var(--soft);letter-spacing:5px;font-weight:400;margin-top:4px;}
.start-title{font-family:'Goyang','Gowun Batang',serif;font-size:clamp(60px,11vw,92px);font-weight:900;line-height:1.05;background:linear-gradient(135deg,var(--hot) 0%,var(--coral) 45%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:titleGlow 3s ease-in-out infinite alternate;}
@keyframes titleGlow{0%{filter:drop-shadow(0 3px 10px rgba(212,68,110,.2))}100%{filter:drop-shadow(0 5px 24px rgba(212,68,110,.6))}}
.hero-wrap{margin:2px auto;animation:heroFloat 4s ease-in-out infinite alternate;}
@keyframes heroFloat{0%{transform:translateY(-6px)}100%{transform:translateY(6px)}}
.hero-spin{animation:hSpin 14s linear infinite;}@keyframes hSpin{to{transform:rotate(360deg)}}
.hero-contra{animation:hSpinR 14s linear infinite;}@keyframes hSpinR{to{transform:rotate(-360deg)}}
.start-sub{font-size:clamp(20px,2.5vw,22px);color:var(--soft);line-height:1.7;}
.start-sub strong{color:var(--rose);font-weight:900;}
.btn-wrap{position:relative;display:inline-block;}
.pulse-ring{position:absolute;border-radius:80px;border:3px solid rgba(232,23,93,.35);animation:pRing 2s ease-out infinite;}
.pulse-ring.r1{inset:-8px}.pulse-ring.r2{inset:-17px;border-color:rgba(232,23,93,.18);animation-delay:.75s}
@keyframes pRing{0%{transform:scale(.88);opacity:1}100%{transform:scale(1.22);opacity:0}}
.btn-start{position:relative;background:linear-gradient(130deg,var(--hot),var(--rose) 50%,var(--coral));color:white;border:none;padding:clamp(22px,3.5vw,30px) clamp(64px,11vw,106px);border-radius:70px;font-family:'Goyang','Noto Serif KR',serif;font-size:clamp(22px,3.5vw,30px);font-weight:900;cursor:pointer;letter-spacing:1px;box-shadow:0 8px 40px rgba(232,23,93,.4);transition:transform .15s;overflow:hidden;}
.btn-start::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,transparent 55%);border-radius:inherit;}
.btn-start:active{transform:scale(.96);}
.btn-qr{background:rgba(255,255,255,.75);border:2.5px solid var(--leaf);color:var(--leaf);padding:14px 34px;border-radius:50px;font-family:'Noto Sans KR',sans-serif;font-size:clamp(17px,2.2vw,19px);font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(61,122,82,.2);transition:all .2s;margin-top:2px;}
.btn-qr:active{background:var(--leaf);color:white;}

/* ── QUIZ ── */
#quiz-screen{background:linear-gradient(155deg,#fdf7ef 0%,#faf0f6 100%);padding:clamp(14px,2.5vw,22px);}
.quiz-hdr{width:100%;max-width:800px;display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.prog-bg{flex:1;height:12px;background:rgba(0,0,0,.08);border-radius:6px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--petal),var(--rose));border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.prog-lbl{font-size:clamp(16px,2.5vw,20px);font-weight:900;color:var(--soft);white-space:nowrap;}
.cat-chip{font-size:clamp(17px,2.8vw,23px);font-weight:900;padding:7px 22px;border-radius:28px;margin-bottom:12px;display:inline-block;letter-spacing:.5px;}
.chip-ei{background:#fde8f0;color:var(--rose)}.chip-sn{background:#e8f4e8;color:var(--leaf)}
.chip-tf{background:#fff3e0;color:var(--gold)}.chip-jp{background:#e8eef8;color:#4a6aa0}
.q-card{background:white;border-radius:26px;padding:clamp(20px,4vw,40px) clamp(22px,4vw,42px);max-width:800px;width:100%;box-shadow:0 14px 52px rgba(0,0,0,.09);text-align:center;margin-bottom:12px;}
.q-num{display:none;}
.q-text{font-family:'Noto Sans KR',sans-serif;font-size:clamp(22px,3.8vw,34px);font-weight:900;color:var(--text);line-height:1.5;}
.options{display:flex;flex-direction:column;gap:13px;max-width:800px;width:100%;margin-bottom:12px;}
.opt-btn{background:white;border:3px solid rgba(0,0,0,.08);border-radius:20px;padding:clamp(17px,2.8vw,25px) clamp(18px,3vw,32px);cursor:pointer;transition:all .2s ease;text-align:left;display:flex;align-items:center;gap:15px;box-shadow:0 3px 12px rgba(0,0,0,.06);}
.opt-btn:active{transform:scale(.985)}
.opt-btn.sel-a{background:linear-gradient(135deg,#fde8f0,#fcd8e8);border-color:var(--petal);box-shadow:0 6px 22px rgba(232,23,93,.2)}
.opt-btn.sel-b{background:linear-gradient(135deg,#e8f4e8,#daf0da);border-color:#90c090;box-shadow:0 6px 22px rgba(90,158,111,.2)}
.opt-lbl{width:42px;height:42px;min-width:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:clamp(16px,2.5vw,21px);color:white;}
.lbl-a{background:linear-gradient(135deg,var(--hot),var(--rose))}.lbl-b{background:linear-gradient(135deg,var(--sage),var(--leaf))}
.opt-text{font-size:clamp(17px,2.8vw,25px);color:var(--text);line-height:1.4;font-weight:700;}

/* ★ 이전 버튼만 남김 */
.nav-row{display:flex;align-items:center;max-width:800px;width:100%;}
.btn-prev{background:white;border:2.5px solid rgba(0,0,0,.12);border-radius:50px;padding:clamp(11px,1.8vw,16px) clamp(24px,3.5vw,38px);font-family:'Noto Sans KR',sans-serif;font-size:clamp(15px,2.2vw,21px);font-weight:900;color:var(--soft);cursor:pointer;transition:all .18s;box-shadow:0 3px 10px rgba(0,0,0,.07);}
.btn-prev:disabled{opacity:.28;cursor:not-allowed}
.btn-prev:not(:disabled):active{background:#f5f0ee;transform:scale(.97)}

/* 마지막 문항 선택 후 결과 버튼 */
.btn-result-show{
  margin-left:auto;
  background:linear-gradient(135deg,var(--rose),var(--hot));
  color:white;border:none;border-radius:50px;
  padding:clamp(13px,2vw,18px) clamp(30px,5vw,54px);
  font-family:'Noto Serif KR',serif;
  font-size:clamp(17px,2.5vw,24px);font-weight:900;cursor:pointer;
  box-shadow:0 5px 18px rgba(212,68,110,.4);
  animation:btnPop .4s cubic-bezier(.175,.885,.32,1.275) both;
}
@keyframes btnPop{from{transform:scale(.7);opacity:0}}
.btn-result-show:active{opacity:.9;transform:scale(.97)}
.btn-result-show.hidden{display:none;}

.si{animation:slideIn .32s cubic-bezier(.25,.46,.45,.94) both}
.si-r{animation:slideInR .32s cubic-bezier(.25,.46,.45,.94) both}
@keyframes slideIn{from{transform:translateX(44px);opacity:0}}
@keyframes slideInR{from{transform:translateX(-44px);opacity:0}}

/* ── RESULT ── */
#result-screen{overflow-y:auto;overflow-x:hidden;padding:0;display:flex;flex-direction:column;align-items:center;}
.res-inner{max-width:720px;width:100%;text-align:center;padding:clamp(30px,6vh,60px) 16px 60px;}
.res-top-spacer{height:clamp(40px,8vh,80px);min-height:40px;display:block;flex-shrink:0;}
.res-eye{font-size:clamp(15px,2.3vw,21px);color:var(--soft);letter-spacing:2px;font-weight:900;margin-bottom:4px;}
.res-mbti{font-family:'Goyang','Noto Serif KR',serif;font-size:clamp(86px,20vw,140px);font-weight:900;line-height:1;margin:8px 0 2px;text-shadow:0 3px 0 rgba(0,0,0,.12);animation:resPop .7s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes resPop{0%{transform:scale(.3) rotate(-12deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.res-flower-name{font-family:'Goyang','Noto Serif KR',serif;font-size:clamp(38px,8vw,58px);font-weight:900;color:var(--leaf);margin-bottom:6px;}
.res-flower-stage{position:relative;width:clamp(220px,48vw,320px);height:clamp(220px,48vw,320px);margin:8px auto 14px;}
.stage-glow{position:absolute;inset:-10px;border-radius:50%;animation:glowPulse 3s ease-in-out infinite alternate;}
@keyframes glowPulse{0%{transform:scale(.9);opacity:.4}100%{transform:scale(1.08);opacity:.9}}
.petal-orbit{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.orbit-spin{animation:orbitFwd 10s linear infinite;}@keyframes orbitFwd{to{transform:rotate(360deg)}}
.orbit-contra{animation:orbitBack 7s linear infinite;}@keyframes orbitBack{to{transform:rotate(-360deg)}}
.flower-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;animation:floatBob 3s ease-in-out infinite alternate;}
@keyframes floatBob{0%{transform:translateY(-9px) scale(1.02)}100%{transform:translateY(9px) scale(.98)}}
.sparkle-dot{position:absolute;border-radius:50%;animation:sdAnim ease-in-out infinite alternate;}
@keyframes sdAnim{0%{opacity:0;transform:scale(0)}100%{opacity:1;transform:scale(1)}}
.res-badge{display:inline-block;background:var(--gold);color:white;font-size:clamp(13px,2vw,17px);font-weight:900;padding:5px 18px;border-radius:20px;margin-bottom:13px;}
.res-desc{font-size:clamp(15px,2.3vw,21px);color:var(--text);line-height:1.85;background:white;border-radius:20px;padding:clamp(17px,3vw,30px);box-shadow:0 8px 32px rgba(0,0,0,.08);margin:0 4px 18px;}
.seed-box{background:none;border:none;padding:8px 4px;margin:0 4px 16px;font-size:clamp(17px,2.8vw,23px);color:var(--leaf);font-weight:900;line-height:1.7;text-align:center;}
.res-logo-wrap{display:flex;justify-content:center;margin:0 4px 16px;}
.res-logo{
  height:clamp(42px,7vw,62px);width:auto;
  mix-blend-mode:multiply;
}
.res-logo-wrap {
  background:white;
  border:2.5px solid rgba(61,122,82,.5);
  border-radius:14px;
  padding:8px 20px;
  display:inline-flex;
  justify-content:center;
  align-items:center;
  margin:0 auto 16px;
}
.btn-restart{background:white;border:2px solid var(--rose);color:var(--rose);padding:clamp(10px,1.5vw,14px) clamp(28px,4.5vw,48px);border-radius:50px;font-family:'Noto Sans KR',sans-serif;font-size:clamp(13px,1.8vw,16px);font-weight:700;cursor:pointer;transition:all .2s;opacity:.75;}
.btn-restart:active{background:var(--rose);color:white;transform:scale(.97)}

/* ── QR MODAL ── */
#qr-modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#qr-modal.hidden{display:none;}
.qr-card{background:white;border-radius:24px;padding:28px 36px;max-width:440px;width:90%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.3);animation:qrPop .4s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes qrPop{from{transform:scale(.8);opacity:0}}
.qr-title{font-family:'Noto Serif KR',serif;font-size:20pt;font-weight:900;color:var(--text);margin-bottom:5px;}
.qr-sub{font-size:11pt;color:var(--soft);margin-bottom:16px;line-height:1.55;font-weight:700;}
#qr-img-wrap{margin:0 auto 12px;min-height:160px;display:flex;align-items:center;justify-content:center;}
.qr-notice{background:#fff8e8;border:2px solid #f0d060;border-radius:12px;padding:12px 16px;font-size:10pt;font-weight:700;color:#8a5800;line-height:1.6;margin-bottom:14px;text-align:left;}
.qr-url-box{background:#f5f0ea;border-radius:10px;padding:10px 16px;font-size:10pt;font-weight:700;color:var(--text);word-break:break-all;margin-bottom:16px;}
.btn-qr-close{background:var(--leaf);color:white;border:none;padding:12px 36px;border-radius:50px;font-size:14pt;font-weight:900;cursor:pointer;}
.btn-qr-close:active{opacity:.85}
</style>
</head>

let cur=0, answers=new Array(12).fill(null), picking=false;

(function init(){
  const pw=document.getElementById('petals-wrap');
  const pc=['#f7afc8','#fce0ea','#5a9e6f','#d4446e','#f0d080','#b8a0e8','#f4845f','#ffffff'];
  for(let i=0;i<28;i++){const d=document.createElement('div');d.className='falling-petal';const sz=9+Math.random()*26;d.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz*.55}px;background:${pc[i%pc.length]};animation-duration:${7+Math.random()*10}s;animation-delay:${Math.random()*12}s;transform:rotate(${Math.random()*360}deg);`;pw.appendChild(d);}
  const sw=document.getElementById('sparkles-wrap');
  [[8,12],[18,72],[32,88],[52,6],[62,82],[78,18],[88,58],[44,42],[12,52],[72,76],[25,30],[85,35]].forEach(([x,y])=>{const s=document.createElement('div');s.className='sparkle';s.style.cssText=`left:${x}%;top:${y}%;font-size:${10+Math.random()*16}px;animation-duration:${1.3+Math.random()*2.5}s;animation-delay:${Math.random()*2.5}s;`;sw.appendChild(s);});
})();

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function startQuiz(){cur=0;answers=new Array(12).fill(null);picking=false;showScreen('quiz-screen');renderQ(true);}
function restart(){showScreen('start-screen');}

function renderQ(fwd=true){
  const q=questions[cur];
  document.getElementById('prog-fill').style.width=(cur/12*100)+'%';
  document.getElementById('prog-lbl').textContent=(cur+1)+' / 12';
  const chip=document.getElementById('cat-chip');chip.className='cat-chip '+q.chip;chip.textContent=q.cat;
  const card=document.getElementById('q-card');card.className='q-card '+(fwd?'si':'si-r');void card.offsetWidth;
  document.getElementById('q-num').textContent='Q'+(cur+1);
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('opt-a').textContent=q.a;
  document.getElementById('opt-b').textContent=q.b;
  const s=answers[cur];
  document.getElementById('btn-a').className='opt-btn'+(s==='A'?' sel-a':'');
  document.getElementById('btn-b').className='opt-btn'+(s==='B'?' sel-b':'');
  document.getElementById('btn-prev').disabled=cur===0;
  // 결과보기 버튼: 마지막 문항에서 이미 답 골랐을 때만 표시
  const resBtn=document.getElementById('btn-result');
  if(cur===11 && answers[11]!==null) resBtn.classList.remove('hidden');
  else resBtn.classList.add('hidden');
  picking=false;
}

function pick(ch){
  if(picking) return;
  picking=true;
  answers[cur]=ch;
  document.getElementById('btn-a').className='opt-btn'+(ch==='A'?' sel-a':'');
  document.getElementById('btn-b').className='opt-btn'+(ch==='B'?' sel-b':'');

  if(cur < 11){
    // ★ 자동으로 다음 문항
    setTimeout(()=>goTo(cur+1), 450);
  } else {
    // ★ 마지막 문항 — 결과보기 버튼 등장
    const resBtn=document.getElementById('btn-result');
    resBtn.classList.remove('hidden');
    picking=false;
  }
}

function goTo(idx){if(idx<0||idx>11)return;const fwd=idx>cur;cur=idx;renderQ(fwd);}

function calcMBTI(){
  const s={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  questions.forEach((q,i)=>{const ch=answers[i];if(!ch)return;s[ch==='A'?q.aVal:q.axis.replace(q.aVal,'')]++;});
  return(s.E>=s.I?'E':'I')+(s.S>=s.N?'S':'N')+(s.T>=s.F?'T':'F')+(s.J>=s.P?'J':'P');
}

// ── 통계 전송 ──────────────────────────────
function sendStats(m, d) {
  if (!STATS_URL) return; // URL 없으면 스킵
  try {
    const s = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
    questions.forEach((q,i)=>{
      const ch=answers[i]; if(!ch) return;
      s[ch==='A'?q.aVal:q.axis.replace(q.aVal,'')]++;
    });
    const payload = {
      mbti: m,
      flower: d.flower,
      group: d.group,
      device: /Mobi|Android|iPhone/i.test(navigator.userAgent) ? 'mobile' : 'tablet',
      answers: answers,
      ei: `E${s.E}/I${s.I}`,
      sn: `S${s.S}/N${s.N}`,
      tf: `T${s.T}/F${s.F}`,
      jp: `J${s.J}/P${s.P}`,
    };
    fetch(STATS_URL, {
      method: 'POST',
      mode: 'no-cors', // CORS 우회 (Apps Script 특성)
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    }).catch(()=>{}); // 실패해도 앱은 정상 작동
  } catch(e) {}
}

function showResult(){
  const m=calcMBTI(), d=mbtiData[m];
  sendStats(m, d); // ← 통계 전송
  const el=document.getElementById('res-mbti');el.textContent=m;el.style.color=d.color;
  document.getElementById('res-flower-name').textContent=d.emoji+' '+d.flower;
  document.getElementById('res-group').textContent=d.group;
  document.getElementById('res-desc').innerHTML=d.desc;
  document.getElementById('result-screen').style.background=`linear-gradient(155deg,${d.bg} 0%,#fce8f0 55%,#eef4e8 100%)`;
  buildStage(m, d.color);
  showScreen('result-screen');
  const rs=document.getElementById('result-screen');rs.scrollTop=0;setTimeout(()=>{rs.scrollTo({top:0,behavior:'instant'});},30);
}

function buildStage(mbti, color){
  const stage=document.getElementById('res-flower-stage');
  const sz=stage.offsetWidth||270;
  const mid=sz/2;
  document.getElementById('stage-glow').style.background=`radial-gradient(circle,${color}40 30%,transparent 70%)`;
  // 바깥 회전 링
  let o=`<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}" xmlns="http://www.w3.org/2000/svg">`;
  for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2-Math.PI/2;const cx=mid+Math.cos(a)*sz*.43,cy=mid+Math.sin(a)*sz*.43;o+=`<ellipse cx="${cx}" cy="${cy}" rx="${sz*.1}" ry="${sz*.065}" fill="${color}" opacity="${i%2?.65:.82}" transform="rotate(${i/12*360} ${cx} ${cy})"/>`;}
  o+='</svg>';
  document.getElementById('orbit-outer').innerHTML=o;
  // 안쪽 링 (작은 원들)
  let inn=`<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}" xmlns="http://www.w3.org/2000/svg">`;
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2-Math.PI/2;const cx=mid+Math.cos(a)*sz*.29,cy=mid+Math.sin(a)*sz*.29;inn+=`<circle cx="${cx}" cy="${cy}" r="${sz*.038}" fill="${color}" opacity=".5"/>`;}
  inn+='</svg>';
  document.getElementById('orbit-inner').innerHTML=inn;
  // ★ 실제 꽃 모양 SVG
  const fn=FLOWER[mbti]||FLOWER['ENFJ'];
  document.getElementById('flower-center').innerHTML=fn(color);
  // 파티클
  const dp=document.getElementById('sparkle-dots');dp.innerHTML='';
  const pc=[color,'#fde047','#f9a8d4','#86efac','#93c5fd','#fca5a5'];
  for(let i=0;i<14;i++){const a=(i/14)*Math.PI*2;const pr=sz*(.44+Math.random()*.1);const x=mid+Math.cos(a)*pr,y=mid+Math.sin(a)*pr;const ps=5+Math.random()*9;const dot=document.createElement('div');dot.className='sparkle-dot';dot.style.cssText=`width:${ps}px;height:${ps}px;background:${pc[i%pc.length]};left:${x-ps/2}px;top:${y-ps/2}px;position:absolute;border-radius:50%;animation-duration:${1+Math.random()*1.5}s;animation-delay:${Math.random()*1.5}s;`;dp.appendChild(dot);}
}

// ── QR ──
function showQR(){
  document.getElementById('qr-modal').classList.remove('hidden');
  document.getElementById('qr-url-display').textContent=QUIZ_URL;
  const wrap=document.getElementById('qr-img-wrap');
  if(wrap.querySelector('img,div.loaded')) return;
  const img=document.createElement('img');
  img.style.cssText='width:200px;height:200px;border-radius:12px;border:6px solid white;box-shadow:0 4px 16px rgba(0,0,0,.15);';
  img.onerror=()=>{
    wrap.innerHTML='';
    document.getElementById('qr-notice').style.display='block';
  };
  img.onload=()=>img.classList.add('loaded');
  img.src=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&color=1a0a00&bgcolor=ffffff&data=${encodeURIComponent(QUIZ_URL)}`;
  wrap.appendChild(img);
}
function closeQR(){document.getElementById('qr-modal').classList.add('hidden');}
</script>
